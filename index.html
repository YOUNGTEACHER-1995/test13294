<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Access Studio & VisionBot</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <header>
            <div class="header-content">
                <h1>Color Access <span>Studio</span></h1>
                <p class="subtitle">Ensuring inclusive design for everyone.</p>
            </div>
            <button id="help-toggle" aria-label="Show help">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
            </button>
        </header>

        <main>
            <section id="palette-section">
                <div class="section-header">
                    <h2>Your Palette</h2>
                    <button id="add-color" class="btn-primary">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        Add Color
                    </button>
                </div>
                <div id="palette-grid" class="palette-grid">
                    <!-- Color Cards will be injected here -->
                </div>
            </section>

            <section id="simulator-section">
                <div class="simulator-controls">
                    <h2>Simulation Filter</h2>
                    <div class="filter-tabs" role="tablist">
                        <button class="filter-tab active" data-filter="normal" role="tab" aria-selected="true">Normal</button>
                        <button class="filter-tab" data-filter="protanopia" role="tab" aria-selected="false">Protanopia</button>
                        <button class="filter-tab" data-filter="deuteranopia" role="tab" aria-selected="false">Deuteranopia</button>
                        <button class="filter-tab" data-filter="tritanopia" role="tab" aria-selected="false">Tritanopia</button>
                    </div>
                </div>

                <div class="simulation-view">
                    <div class="view-panel original">
                        <span class="view-label">Original</span>
                        <div id="original-render" class="render-area"></div>
                    </div>
                    <div class="view-panel simulated">
                        <span class="view-label" id="simulation-label">Normal Vision</span>
                        <div id="simulated-render" class="render-area"></div>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <p style="text-align: center; color: var(--text-secondary); margin-top: 2rem;">&copy; 2026 Color Access Studio. Built with Gemini.</p>
        </footer>

        <!-- Floating Chatbot UI -->
        <div id="chat-widget">
            <button id="chat-toggle" aria-label="Toggle VisionBot">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
            </button>
            <div id="chat-window" class="hidden">
                <div id="chat-header">
                    <h3>Vision<span>Bot</span></h3>
                    <button id="close-chat">&times;</button>
                </div>
                <div id="chat-input-area">
                    <input type="text" id="user-input" placeholder="Search images..." aria-label="Chat input">
                    <button id="send-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </div>
                <div id="chat-messages">
                    <div class="message bot">
                        <div class="message-content">Hi! Ask me to find an image to see its accessibility views.</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <svg style="display: none;">
        <defs>
            <filter id="protanopia-filter">
                <feColorMatrix type="matrix" values="0.567, 0.433, 0, 0, 0, 0.558, 0.442, 0, 0, 0, 0, 0.242, 0.758, 0, 0, 0, 0, 0, 1, 0" />
            </filter>
            <filter id="deuteranopia-filter">
                <feColorMatrix type="matrix" values="0.625, 0.375, 0, 0, 0, 0.7, 0.3, 0, 0, 0, 0, 0.3, 0.7, 0, 0, 0, 0, 0, 1, 0" />
            </filter>
            <filter id="tritanopia-filter">
                <feColorMatrix type="matrix" values="0.95, 0.05, 0, 0, 0, 0, 0.433, 0.567, 0, 0, 0, 0.475, 0.525, 0, 0, 0, 0, 0, 1, 0" />
            </filter>
        </defs>
    </svg>

    <script type="module" src="main.js"></script>
</body>
</html>
