<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Vision Bot</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <header>
            <div class="header-content">
                <h1>Vision<span>Bot</span></h1>
                <p class="subtitle">Experience the world through different eyes.</p>
            </div>
        </header>

        <main id="chat-container">
            <div id="chat-input-area">
                <input type="text" id="user-input" placeholder="Type a message (e.g. 'Show me a red rose')..." aria-label="Chat input">
                <button id="send-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>

            <div id="chat-messages">
                <div class="message bot">
                    <div class="message-content">
                        Hello! I'm VisionBot. Ask me to show you an image (e.g., "Show me a watermelon") and I'll show you how it looks to people with color blindness.
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <p style="text-align: center; color: var(--text-secondary); margin-top: 1rem;">Powered by Gemini & Unsplash</p>
        </footer>
    </div>

    <!-- Color Blindness Simulation Filters -->
    <svg style="display: none;">
        <defs>
            <filter id="protanopia-filter">
                <feColorMatrix type="matrix" values="0.567, 0.433, 0, 0, 0, 0.558, 0.442, 0, 0, 0, 0, 0.242, 0.758, 0, 0, 0, 0, 0, 1, 0" />
            </filter>
            <filter id="deuteranopia-filter">
                <feColorMatrix type="matrix" values="0.625, 0.375, 0, 0, 0, 0.7, 0.3, 0, 0, 0, 0, 0.3, 0.7, 0, 0, 0, 0, 0, 1, 0" />
            </filter>
            <filter id="tritanopia-filter">
                <feColorMatrix type="matrix" values="0.95, 0.05, 0, 0, 0, 0, 0.433, 0.567, 0, 0, 0, 0.475, 0.525, 0, 0, 0, 0, 0, 1, 0" />
            </filter>
        </defs>
    </svg>

    <script type="module" src="main.js"></script>
</body>
</html>
